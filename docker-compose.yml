version: '3.9'

name: teamflow_backend

services:
  # Redis service
  redis:
    image: redis:8-alpine
    container_name: redis_container
    ports:
      - '6379:6379'
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD}']
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # PostgreSQL service
  postgres:
    image: postgres:16-alpine
    container_name: postgres_container
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy"
    restart: 'no'
    profiles: ['migrate']

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teamflow_api
    env_file:
      - .env
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: 'no'

  api-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: teamflow_api_dev
    env_file:
      - .env
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
    restart: 'no'
    profiles: ['dev']

volumes:
  redis_data:
  postgres_data:
  api_node_modules:
