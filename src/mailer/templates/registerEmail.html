<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome to TeamFlow</title>
  </head>
  <body
    style="
      font-family: Arial, sans-serif;
      background-color: #f8f9fa;
      margin: 0;
      padding: 0;
    "
  >
    <table width="100%" cellpadding="0" cellspacing="0">
      <tr>
        <td style="padding: 20px; display: flex; justify-content: center">
          <table
            width="350"
            cellpadding="0"
            cellspacing="0"
            style="
              background-color: #ffffff;
              border-radius: 8px;
              overflow: hidden;
            "
          >
            <tr>
              <td
                style="
                  background-color: #0d6efd;
                  color: #ffffff;
                  padding: 20px;
                  font-size: 24px;
                  text-align: center;
                "
              >
                TeamFlow
              </td>
            </tr>
            <tr>
              <td style="padding: 30px; font-size: 16px; color: #333333">
                <p>Hello,</p>
                <p style="text-indent: 30px">
                  Welcome to TeamFlow! We're excited to have you on board. Click
                  the button below to get started:
                </p>
                <a
                  href="{{verify_url}}"
                  style="
                    display: inline-block;
                    background-color: #0d6efd;
                    color: #ffffff;
                    text-decoration: none;
                    padding: 12px 24px;
                    border-radius: 6px;
                    font-weight: bold;
                  "
                  >Get Started</a
                >
                <p style="margin-top: 20px; font-size: 14px; color: #666666">
                  If you did not register for TeamFlow, you can safely ignore
                  this email.
                </p>
              </td>
            </tr>
            <tr>
              <td
                style="
                  background-color: #f1f1f1;
                  padding: 15px;
                  font-size: 12px;
                  color: #999999;
                  text-align: center;
                "
              >
                TeamFlow • Your Team's Workflow Management Solution<br />
                &copy; 2024 TeamFlow. All rights reserved.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
